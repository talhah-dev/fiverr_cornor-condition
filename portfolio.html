    <script src="./docs/javascript/global.js"></script>
    <script src="./docs/javascript/Navbar.js"></script>
    <script src="./docs/javascript/Footer.js"></script>
    <script>
        const portfolioPassword = "sensational";
        const portfolioStorageKey = "cornerConditionPortfolioAccess";
        const portfolioGate = document.getElementById("portfolioGate");
        const portfolioProtected = document.getElementById("portfolioProtected");
        const portfolioForm = document.getElementById("portfolioPasswordForm");
        const portfolioInput = document.getElementById("portfolioPasswordInput");
        const portfolioError = document.getElementById("portfolioPasswordError");

        const unlockPortfolio = () => {
            portfolioGate.classList.add("hidden");
            portfolioProtected.classList.remove("hidden");
        };

        if (window.sessionStorage.getItem(portfolioStorageKey) === "granted") {
            unlockPortfolio();
        }

        portfolioForm?.addEventListener("submit", (event) => {
            event.preventDefault();

            if (portfolioInput.value === portfolioPassword) {
                window.sessionStorage.setItem(portfolioStorageKey, "granted");
                portfolioError.classList.add("hidden");
                unlockPortfolio();
                return;
            }

            portfolioError.classList.remove("hidden");
            portfolioInput.value = "";
            portfolioInput.focus();
        });

        const gallery = document.getElementById("lightbox-gallery");

        if (gallery && window.lightGallery) {
            window.lightGallery(gallery, {
                selector: "a",
                download: false,
                counter: false,
            });
        }
    </script>
