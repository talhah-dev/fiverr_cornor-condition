<body class="m-0 bg-[#ff0000]">

    <div id="navbar"></div>

    <main class="px-4 pb-16 pt-24 sm:px-6 lg:px-10">
        <section class="mx-auto max-w-6xl text-white">
            <div class="mx-auto max-w-3xl text-center">
                <p class="text-4xl font-medium text-white">Music</p>
             
            </div>

            <div class="mt-12 space-y-8">
                <section class="">
                    <div class="relative mx-auto h-[480px] w-full max-w-[440px] overflow-hidden rounded-2xl sm:h-[520px]">
                        <iframe
                            style="position:absolute; top:0; left:0; width:100%; height:100%;"
                            src="https://bandcamp.com/EmbeddedPlayer/track=3028867922/size=large/bgcol=ffffff/linkcol=de270f/tracklist=false/transparent=true/"
                            title="Bandcamp player"
                            class="embed-content w-full mx-auto"
                            sandbox="allow-same-origin allow-scripts allow-pointer-lock allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>
                    </div>
                </section>

                <section class="">
                    <div class="relative overflow-hidden rounded-2xl" style="padding-top: 38%;">
                        <iframe
                            src="https://open.spotify.com/embed/artist/0oLEVhi38oprboMuNqFX6e?utm_source=generator&amp;theme=0"
                            title="Spotify player"
                            frameborder="0"
                            allowfullscreen=""
                            allow="autoplay; picture-in-picture"
                            style="position:absolute; top:0; left:0; width:100%; height:100%;"
                            class="embed-content"
                            sandbox="allow-same-origin allow-scripts allow-pointer-lock allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>
                    </div>
                </section>

                <section class="">
                    <div class="relative h-[420px] overflow-hidden rounded-2xl sm:h-[460px]">
                        <iframe
                            src="https://embed.music.apple.com/us/album/bank-mrdr-ss-23-single/1649088601?itscg=30200&amp;itsct=music_box_player&amp;ls=1&amp;app=music&amp;mttnsubad=1649088601&amp;theme=auto"
                            id="embedPlayer"
                            title="Apple Music player"
                            allow="autoplay *"
                            style="position:absolute; top:0; left:0; width:100%; height:100%;"
                            class="embed-content"
                            sandbox="allow-same-origin allow-scripts allow-pointer-lock allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>
                    </div>
                </section>
            </div>
        </section>
    </main>

    <div id="footer"></div>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="https://unpkg.com/lenis@1.3.1/dist/lenis.min.js"></script>

    <script src="./docs/javascript/global.js"></script>
    <script src="./docs/javascript/Navbar.js"></script>
    <script src="./docs/javascript/Footer.js"></script>
    <script>
        const gallery = document.getElementById("lightbox-gallery");

        if (gallery && window.lightGallery) {
            window.lightGallery(gallery, {
                selector: "a",
                download: false,
                counter: false,
            });
        }
    </script>
