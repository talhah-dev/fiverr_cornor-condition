<body class="m-0 bg-[#ff0000]">

    <div id="navbar"></div>

    <main class="px-4 pb-16 pt-32 sm:px-6 lg:px-10">
        <section class="mx-auto max-w-4xl text-white">
            <div class="mx-auto max-w-3xl text-center">
                <p class="text-4xl font-medium text-white">Contact Haley</p>
            </div>

            <section class=" pt-20">
                <div class="max-w-2xl mx-auto text-white text-center">

                    <!-- Contact Info -->
                    <h2 class="text-xl font-semibold mb-4">TO CONTACT OR CHAT:</h2>
                    <p class="text-lg mb-2">+49 176 74537970</p>
                    <p class="text-lg mb-8">HALEY.E.CASTRO@GMAIL.COM</p>

                    <!-- Form -->
                    <form class="text-left">

                        <!-- Name -->
                        <label class="block mb-2 font-semibold">NAME *</label>
                        <input type="text" placeholder="Your Name..."
                            class="w-full mb-6 p-3 bg-yellow-300 text-black placeholder-yellow-100 focus:outline-none" />

                        <!-- Email -->
                        <label class="block mb-2 font-semibold">EMAIL *</label>
                        <input type="email" placeholder="Your Email Address..."
                            class="w-full mb-6 p-3 bg-yellow-300 text-black placeholder-yellow-100 focus:outline-none" />

                        <!-- Inquiry -->
                        <label class="block mb-2 font-semibold">INQUIRY *</label>
                        <textarea rows="6" placeholder="Your Message..."
                            class="w-full mb-6 p-3 bg-yellow-300 text-black placeholder-yellow-100 focus:outline-none"></textarea>

                        <!-- Button -->
                        <button type="submit"
                            class="bg-blue-700 text-yellow-300 px-8 py-3 font-semibold hover:bg-blue-800 transition">
                            SUBMIT
                        </button>

                    </form>
                </div>
            </section>
        </section>
    </main>

    <div id="footer"></div>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="https://unpkg.com/lenis@1.3.1/dist/lenis.min.js"></script>
    <script src="./docs/javascript/global.js"></script>
    <script src="./docs/javascript/Navbar.js"></script>
    <script src="./docs/javascript/Footer.js"></script>

</body>

</html>
