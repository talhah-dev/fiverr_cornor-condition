    <title>Contact Haley Castro | Corner Condition</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"

    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />

</head>

<body class="m-0 bg-gradient-to-br from-[#ff0000] to-red-700">

    <div id="navbar"></div>

    <main class="px-4 pb-16 pt-32 sm:px-6 lg:px-10">
        <section class="mx-auto max-w-6xl text-white">
            <div class="mx-auto max-w-3xl text-center">
                <p class="text-sm uppercase text-white/70">Contact Haley</p>
                <h1 class="mt-4 text-4xl font-medium sm:text-6xl">Haley Castro</h1>
                <p class="mx-auto mt-5 max-w-2xl text-sm leading-7 text-white/80 sm:text-base">
                    For work, direct contact, or a quick chat, use the information below or send a message through the
                    form.
                </p>
            </div>

            <div class="mt-12 grid gap-6 lg:grid-cols-[0.9fr_1.1fr]">
                <div class="text-white">
                    <p class="text-sm uppercase text-white/70">To Contact Or Chat</p>
                    <div class="mt-6 space-y-5">
                        <a href="tel:+4917674537970" class="block text-2xl font-medium sm:text-3xl">
                            +49 176 74537970
                        </a>
                        <a href="mailto:haley.e.castro@gmail.com" class="block text-base text-white/85 sm:text-lg">
                            haley.e.castro@gmail.com
                        </a>
                    </div>
                </div>

                <div>
                    <form class="space-y-5">
                        <div>
                            <label for="name" class="mb-2 block text-sm text-white/75">Name</label>
                            <input id="name" name="name" type="text"
                                class="w-full rounded-2xl border border-white/15 bg-white/10 px-4 py-3 text-white placeholder:text-white/45"
                                placeholder="Your name" />
                        </div>

                        <div>
                            <label for="email" class="mb-2 block text-sm text-white/75">Email</label>
                            <input id="email" name="email" type="email"
                                class="w-full rounded-2xl border border-white/15 bg-white/10 px-4 py-3 text-white placeholder:text-white/45"
                                placeholder="Your email" />
                        </div>

                        <div>
                            <label for="subject" class="mb-2 block text-sm text-white/75">Subject</label>
                            <input id="subject" name="subject" type="text"
                                class="w-full rounded-2xl border border-white/15 bg-white/10 px-4 py-3 text-white placeholder:text-white/45"
                                placeholder="Subject" />
                        </div>

                        <div>
                            <label for="message" class="mb-2 block text-sm text-white/75">Message</label>
                            <textarea id="message" name="message" rows="6"
                                class="w-full rounded-2xl border border-white/15 bg-white/10 px-4 py-3 text-white placeholder:text-white/45"
                                placeholder="Write your message"></textarea>
                        </div>

                        <button type="submit"
                            class="inline-flex rounded-full bg-white px-7 py-3 text-sm font-medium text-black transition hover:bg-black hover:text-white">
                            Send Message
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <div id="footer"></div>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="https://unpkg.com/lenis@1.3.1/dist/lenis.min.js"></script>
    <script src="./docs/javascript/global.js"></script>
    <script src="./docs/javascript/Navbar.js"></script>
    <script src="./docs/javascript/Footer.js"></script>

</body>

</html>
