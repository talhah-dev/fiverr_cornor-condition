<!DOCTYPE html>
<html lang="en-GB">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Corner Condition is a multivalent electronic music duo blending hardcore pulse, politically-charged lyrics, and a sharp visual identity." />
    <meta name="keywords"
        content="Corner Condition, electronic music duo, EBM, hardcore, gabber, experimental music, Haley Castro, Evan Ho" />
    <meta name="author" content="Corner Condition" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#b91c1c" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Corner Condition | Electronic Music Duo" />
    <meta property="og:description" content="Multivalent electronic music shaped by tension, velocity, and critique." />
    <meta property="og:site_name" content="Corner Condition" />
    <meta property="og:locale" content="en_GB" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Corner Condition | Electronic Music Duo" />
    <meta name="twitter:description"
        content="Multivalent electronic music shaped by tension, velocity, and critique." />

    <title>Corner Condition | Electronic Music Duo</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="https://unpkg.com/lenis@1.3.1/dist/lenis.css" />
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.8.3/css/lightgallery-bundle.min.css"
        referrerpolicy="no-referrer" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./docs/Style.css" />
</head>

<body class="m-0 bg-gradient-to-br from-[#ff0000] to-red-700">

    <div id="navbar"></div>

    <main class="min-h-screen bg-transparent px-4 pb-16 pt-32 sm:px-6 lg:px-10">
        <section class="mx-auto max-w-7xl">
            <div class="mx-auto max-w-3xl text-center">
                <h1 class="text-4xl font-medium text-white sm:text-5xl">
                    HOME
                </h1>
            </div>

            <div id="lightbox-gallery" class="mt-14 grid md:grid-cols-3 grid-cols-1 gap-3 space-y-3">

                <article class="w-full h-full overflow-hidden ">
                    <a href="/docs/assets/img1.jpg" class="block overflow-hidden ">
                        <img src="/docs/assets/img1.jpg" alt="Live performance crowd"
                            class="w-full md:h-[30rem] cursor-pointer object-cover transition duration-300 hover:scale-[1.02]" />
                    </a>
                </article>

                <article class="md:col-span-2 overflow-hidden ">
                    <a href="/docs/assets/img2.jpg" class="block overflow-hidden ">
                        <img src="/docs/assets/img2.jpg" alt="Music studio setup"
                            class="w-full cursor-pointer object-cover transition duration-300 hover:scale-[1.02]" />
                    </a>
                </article>

                <article class="md:col-span-3 overflow-hidden ">
                    <a href="/docs/assets/img3.jpg" class="block overflow-hidden ">
                        <img src="/docs/assets/img3.jpg"  alt="Stage lighting and performance"
                            class="w-full cursor-pointer  object-cover transition duration-300 hover:scale-[1.02]" />
                    </a>
                </article>

                <article class="md:col-span-3 overflow-hidden ">
                    <a href="/docs/assets/img4.jpg" class="block overflow-hidden ">
                        <img src="/docs/assets/img4.jpg"  alt="Stage lighting and performance"
                            class="w-full cursor-pointer  object-cover transition duration-300 hover:scale-[1.02]" />
                    </a>
                </article>

                <article class="md:col-span-3 overflow-hidden ">
                    <a href="/docs/assets/img5.jpg" class="block overflow-hidden ">
                        <img src="/docs/assets/img5.jpg"  alt="Stage lighting and performance"
                            class="w-full cursor-pointer  object-cover transition duration-300 hover:scale-[1.02]" />
                    </a>
                </article>

                <article class="md:col-span-3 overflow-hidden ">
                    <a href="/docs/assets/img6.jpg" class="block overflow-hidden  src="/docs/assets/img6.jpg"  alt="Stage lighting and performance"
                            class="w-full cursor-pointer  object-cover transition duration-300 hover:scale-[1.02]" />
                    </a>
                </article>

            </div>
        </section>
    </main>


    <div id="footer"></div>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="https://unpkg.com/lenis@1.3.1/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.8.3/lightgallery.umd.min.js"
        referrerpolicy="no-referrer"></script>

    <script src="./docs/javascript/global.js"></script>
    <script src="./docs/javascript/Navbar.js"></script>
    <script src="./docs/javascript/Footer.js"></script>
    <script>
        const gallery = document.getElementById("lightbox-gallery");

        if (gallery && window.lightGallery) {
            window.lightGallery(gallery, {
                selector: "a",
                download: false,
                counter: false,
            });
        }
    </script>

</body>

</html>
