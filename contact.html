<!DOCTYPE html>
<html lang="en-GB">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Corner Condition is a multivalent electronic music duo blending hardcore pulse, politically-charged lyrics, and a sharp visual identity." />
    <meta name="keywords"
        content="Corner Condition, electronic music duo, EBM, hardcore, gabber, experimental music, Haley Castro, Evan Ho" />
    <meta name="author" content="Corner Condition" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#b91c1c" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Corner Condition | Electronic Music Duo" />
    <meta property="og:description" content="Multivalent electronic music shaped by tension, velocity, and critique." />
    <meta property="og:site_name" content="Corner Condition" />
    <meta property="og:locale" content="en_GB" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Corner Condition | Electronic Music Duo" />
    <meta name="twitter:description"
        content="Multivalent electronic music shaped by tension, velocity, and critique." />

    <title>Corner Condition | Electronic Music Duo</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="https://unpkg.com/lenis@1.3.1/dist/lenis.css" />
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.8.3/css/lightgallery-bundle.min.css"
        referrerpolicy="no-referrer" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./docs/Style.css" />
</head>

<body class="m-0 bg-gradient-to-br from-[#ff0000] to-red-700">

    <div id="navbar"></div>

    <main class="px-4 pb-16 pt-32 sm:px-6 lg:px-10">
        <section class="mx-auto max-w-7xl text-white">
            <div class="mx-auto max-w-3xl text-center">
                <p class="text-sm uppercase text-white/70">Contact Us</p>
                <h1 class="mt-4 text-4xl font-medium sm:text-6xl">Get In Touch</h1>
                <p class="mx-auto mt-5 max-w-2xl text-sm leading-7 text-white/80 sm:text-base">
                    For bookings, collaborations, press inquiries, or direct contact, reach out using the number below
                    or send a message through the form.
                </p>
            </div>

            <div class="mt-12 grid gap-6 lg:grid-cols-[0.9fr_1.1fr]">
                <div class="rounded-3xl border border-white/15 bg-red-950/25 p-6 backdrop-blur-xl sm:p-8">
                    <p class="text-sm uppercase text-white/70">Phone</p>
                    <a href="tel:3235052685" class="mt-4 inline-block text-3xl font-medium text-white sm:text-4xl">
                        323-505-2685
                    </a>
                    <p class="mt-5 text-sm leading-7 text-white/75 sm:text-base">
                        Available for bookings, press requests, and general inquiries related to Corner Condition.
                    </p>
                </div>

                <div class="rounded-3xl border border-white/15 bg-red-950/25 p-6 backdrop-blur-xl sm:p-8">
                    <form class="space-y-5">
                        <div>
                            <label for="name" class="mb-2 block text-sm text-white/75">Name</label>
                            <input id="name" name="name" type="text"
                                class="w-full rounded-2xl border border-white/15 bg-white/10 px-4 py-3 text-white placeholder:text-white/45"
                                placeholder="Your name" />
                        </div>

                        <div>
                            <label for="email" class="mb-2 block text-sm text-white/75">Email</label>
                            <input id="email" name="email" type="email"
                                class="w-full rounded-2xl border border-white/15 bg-white/10 px-4 py-3 text-white placeholder:text-white/45"
                                placeholder="Your email" />
                        </div>

                        <div>
                            <label for="subject" class="mb-2 block text-sm text-white/75">Subject</label>
                            <input id="subject" name="subject" type="text"
                                class="w-full rounded-2xl border border-white/15 bg-white/10 px-4 py-3 text-white placeholder:text-white/45"
                                placeholder="Subject" />
                        </div>

                        <div>
                            <label for="message" class="mb-2 block text-sm text-white/75">Message</label>
                            <textarea id="message" name="message" rows="6"
                                class="w-full rounded-2xl border border-white/15 bg-white/10 px-4 py-3 text-white placeholder:text-white/45"
                                placeholder="Write your message"></textarea>
                        </div>

                        <button type="submit"
                            class="inline-flex rounded-full bg-white px-7 py-3 text-sm font-medium text-black transition hover:bg-white/90">
                            Send Message
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <div id="footer"></div>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="https://unpkg.com/lenis@1.3.1/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.8.3/lightgallery.umd.min.js"
        referrerpolicy="no-referrer"></script>

    <script src="./docs/javascript/global.js"></script>
    <script src="./docs/javascript/Navbar.js"></script>
    <script src="./docs/javascript/Footer.js"></script>
    <script>
        const gallery = document.getElementById("lightbox-gallery");

        if (gallery && window.lightGallery) {
            window.lightGallery(gallery, {
                selector: "a",
                download: false,
                counter: false,
            });
        }
    </script>

</body>

</html>
