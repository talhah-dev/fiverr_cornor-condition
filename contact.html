<!DOCTYPE html>
<html lang="en-GB">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Corner Condition is a multivalent electronic music duo blending hardcore pulse, politically-charged lyrics, and a sharp visual identity." />
    <meta name="keywords"
        content="Corner Condition, electronic music duo, EBM, hardcore, gabber, experimental music, Haley Castro, Evan Ho" />
    <meta name="author" content="Corner Condition" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#b91c1c" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Corner Condition | Electronic Music Duo" />
    <meta property="og:description" content="Multivalent electronic music shaped by tension, velocity, and critique." />
    <meta property="og:site_name" content="Corner Condition" />
    <meta property="og:locale" content="en_GB" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Corner Condition | Electronic Music Duo" />
    <meta name="twitter:description"
        content="Multivalent electronic music shaped by tension, velocity, and critique." />

    <title>Corner Condition | Electronic Music Duo</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="https://unpkg.com/lenis@1.3.1/dist/lenis.css" />
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.8.3/css/lightgallery-bundle.min.css"
        referrerpolicy="no-referrer" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./docs/Style.css" />
</head>

<body class="m-0 bg-[#ff0000]">

    <div id="navbar"></div>

    <section class=" min-h-screen  flex flex-col items-center px-6 py-16">

        <!-- Title -->
        <h2 class="text-4xl font-medium text-white mb-6">
            CONTACT
        </h2>

        <!-- Phone Number -->
        <h1 class="text-yellow-300 md:text-5xl text-3xl font-bold italic mb-10">
            323-505-2685
        </h1>

        <!-- Form -->
        <form class="w-full max-w-3xl space-y-6">

            <!-- Name -->
            <input type="text" placeholder="NAME"
                class="w-full bg-gray-200 h-12 px-4 uppercase text-sm italic placeholder:text-blue-300 outline-none" />

            <!-- Email -->
            <input type="email" placeholder="EMAIL"
                class="w-full bg-gray-200 h-12 px-4 uppercase text-sm italic placeholder:text-blue-300 outline-none" />

            <!-- Message -->
            <textarea placeholder="MESSAGE" rows="6"
                class="w-full bg-gray-200 p-4 uppercase text-sm italic placeholder:text-blue-300 outline-none resize-none"></textarea>

            <!-- Submit -->
            <button type="submit"
                class="border border-yellow-300 text-blue-600 italic uppercase px-6 py-2 hover:bg-yellow-300 hover:text-black transition">
                SUBMIT
            </button>

        </form>

    </section>


    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="https://unpkg.com/lenis@1.3.1/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.8.3/lightgallery.umd.min.js"
        referrerpolicy="no-referrer"></script>

    <script src="./docs/javascript/global.js"></script>
    <script src="./docs/javascript/Navbar.js"></script>
    <script>
        const gallery = document.getElementById("lightbox-gallery");

        if (gallery && window.lightGallery) {
            window.lightGallery(gallery, {
                selector: "a",
                download: false,
                counter: false,
            });
        }
    </script>

</body>

</html>
