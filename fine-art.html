<!DOCTYPE html>
<html lang="en-GB">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Corner Condition is a multivalent electronic music duo blending hardcore pulse, politically-charged lyrics, and a sharp visual identity." />
    <meta name="keywords"
        content="Corner Condition, electronic music duo, EBM, hardcore, gabber, experimental music, Haley Castro, Evan Ho" />
    <meta name="author" content="Corner Condition" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#b91c1c" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Corner Condition | Electronic Music Duo" />
    <meta property="og:description" content="Multivalent electronic music shaped by tension, velocity, and critique." />
    <meta property="og:site_name" content="Corner Condition" />
    <meta property="og:locale" content="en_GB" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Corner Condition | Electronic Music Duo" />
    <meta name="twitter:description"
        content="Multivalent electronic music shaped by tension, velocity, and critique." />

    <title>Corner Condition | Electronic Music Duo</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="https://unpkg.com/lenis@1.3.1/dist/lenis.css" />
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.8.3/css/lightgallery-bundle.min.css"
        referrerpolicy="no-referrer" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./docs/Style.css" />
</head>

<body class="m-0 bg-gradient-to-br from-[#ff0000] to-red-700">

    <div id="navbar"></div>

    <main class="px-4 pb-16 pt-32 sm:px-6 lg:px-10">
        <section class="mx-auto max-w-7xl text-white">
            <div class="mx-auto max-w-3xl text-center">
                <p class="text-sm uppercase text-white/70">Fine Art</p>
                <h1 class="mt-4 text-4xl font-medium sm:text-6xl">Fine Art</h1>
            </div>

            <section class="mt-12 grid gap-6 lg:grid-cols-[1.1fr_0.9fr] lg:items-center">
                <div class="overflow-hidden rounded-3xl">
                    <img src="/docs/assets/img39.gif" alt="Private Exhibition December-January 2024-25"
                        class="w-full object-cover" />
                </div>
                <div>
                    <p class="text-xs uppercase text-white/65">Private Exhibition</p>
                    <h2 class="mt-2 text-3xl font-medium">December-January 2024-25</h2>
                    <p class="mt-3 text-sm text-white/75">Group Exhibition</p>
                </div>
            </section>

            <section class="mt-12 grid items-center justify-center text-center gap-6 lg:grid-cols-1 lg:items-center">
                <div class="">
                    <h2 class="text-3xl font-medium">Palm Grove Social</h2>
                    <p class="mt-3 text-sm text-white/75">June 2023</p>
                    <p class="mt-2 text-sm text-white/75">Group Exhibition</p>
                </div>
                <div class="overflow-hidden rounded-3xl">
                    <img src="/docs/assets/img40.jpg" alt="Palm Grove Social June 2023" class="w-full object-cover" />
                </div>
            </section>

            <section class="mt-12">
                <div id="lightbox-gallery" class="columns-1 gap-3 space-y-3 md:columns-2">
                    <article class="break-inside-avoid overflow-hidden rounded-2xl shadow-lg">
                        <a href="/docs/assets/img41.png" class="block overflow-hidden rounded-2xl">
                            <img src="/docs/assets/img41.png" alt="Fine art image 41"
                                class="w-full cursor-pointer object-cover transition duration-300 hover:scale-[1.02]" />
                        </a>
                    </article>
                    <article class="break-inside-avoid overflow-hidden rounded-2xl shadow-lg">
                        <a href="/docs/assets/img42.png" class="block overflow-hidden rounded-2xl">
                            <img src="/docs/assets/img42.png" alt="Fine art image 42"
                                class="w-full cursor-pointer object-cover transition duration-300 hover:scale-[1.02]" />
                        </a>
                    </article>
                    <article class="break-inside-avoid overflow-hidden rounded-2xl shadow-lg">
                        <a href="/docs/assets/img43.png" class="block overflow-hidden rounded-2xl">
                            <img src="/docs/assets/img43.png" alt="Fine art image 43"
                                class="w-full cursor-pointer object-cover transition duration-300 hover:scale-[1.02]" />
                        </a>
                    </article>
                    <article class="break-inside-avoid overflow-hidden rounded-2xl shadow-lg">
                        <a href="/docs/assets/img44.png" class="block overflow-hidden rounded-2xl">
                            <img src="/docs/assets/img44.png" alt="Fine art image 44"
                                class="w-full cursor-pointer object-cover transition duration-300 hover:scale-[1.02]" />
                        </a>
                    </article>
                    <article class="break-inside-avoid overflow-hidden rounded-2xl shadow-lg">
                        <a href="/docs/assets/img45.png" class="block overflow-hidden rounded-2xl">
                            <img src="/docs/assets/img45.png" alt="Fine art image 45"
                                class="w-full cursor-pointer object-cover transition duration-300 hover:scale-[1.02]" />
                        </a>
                    </article>
                    <article class="break-inside-avoid overflow-hidden rounded-2xl shadow-lg">
                        <a href="/docs/assets/img46.gif" class="block overflow-hidden rounded-2xl">
                            <img src="/docs/assets/img46.gif" alt="Fine art image 46"
                                class="w-full cursor-pointer object-cover transition duration-300 hover:scale-[1.02]" />
                        </a>
                    </article>
                    <article class="break-inside-avoid overflow-hidden rounded-2xl shadow-lg">
                        <a href="/docs/assets/img47.jpg" class="block overflow-hidden rounded-2xl">
                            <img src="/docs/assets/img47.jpg" alt="Fine art image 47"
                                class="w-full cursor-pointer object-cover transition duration-300 hover:scale-[1.02]" />
                        </a>
                    </article>
                    <article class="break-inside-avoid overflow-hidden rounded-2xl shadow-lg">
                        <a href="/docs/assets/img48.jpeg" class="block overflow-hidden rounded-2xl">
                            <img src="/docs/assets/img48.jpeg" alt="Fine art image 48"
                                class="w-full cursor-pointer object-cover transition duration-300 hover:scale-[1.02]" />
                        </a>
                    </article>
                </div>
            </section>

            <section class="mt-12 text-center">
                <p class="text-3xl font-medium sm:text-4xl">Art After Dark</p>
                <p class="mt-3 text-sm text-white/75">March 2023</p>
                <p class="mt-2 text-sm text-white/75">Group Exhibition</p>
            </section>
        </section>
    </main>

    <div id="footer"></div>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="https://unpkg.com/lenis@1.3.1/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.8.3/lightgallery.umd.min.js"
        referrerpolicy="no-referrer"></script>

    <script src="./docs/javascript/global.js"></script>
    <script src="./docs/javascript/Navbar.js"></script>
    <script src="./docs/javascript/Footer.js"></script>
    <script>
        const gallery = document.getElementById("lightbox-gallery");

        if (gallery && window.lightGallery) {
            window.lightGallery(gallery, {
                selector: "a",
                download: false,
                counter: false,
            });
        }
    </script>

</body>

</html>
